<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Clima Barra Funda</title>
</head>
<body>
    <script>
        const LAT = "-23.5245";
        const LON = "-46.6658";
        const KEY = "04ebc24bf8afbd407fd0b32ed6f06d2a";
        
        const icones = {
            "01d": "☀️", "01n": "🌙",
            "02d": "⛅", "02n": "☁️",
            "03d": "☁️", "03n": "☁️",
            "04d": "☁️", "04n": "☁️",
            "09d": "🌧️", "09n": "🌧️",
            "10d": "🌦️", "10n": "🌧️",
            "11d": "⛈️", "11n": "⛈️",
            "13d": "❄️", "13n": "❄️",
            "50d": "🌫️", "50n": "🌫️"
        };
        
        // Usa AllOrigins para evitar CORS
        const apiUrl = `https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&units=metric&appid=${KEY}`;
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`;
        
        fetch(proxyUrl)
            .then(r => r.json())
            .then(d => {
                const temp = Math.round(d.main.temp);
                const icone = icones[d.weather[0].icon] || "🌡️";
                
                const linkBadge = `https://img.shields.io/badge/Barra%20Funda-${icone}%20${temp}°C-4682B4?style=for-the-badge`;
                window.location.href = linkBadge;
            })
            .catch(() => {
                window.location.href = "https://img.shields.io/badge/Barra%20Funda-Erro-red?style=for-the-badge";
            });
    </script>
</body>
</html>
