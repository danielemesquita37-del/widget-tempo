<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Previsão Barra Funda</title>
    <style>
        body {
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        #widget-container, #imagem-final {
            background: white;
            border-radius: 30px;
            padding: 15px 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #eaeaea;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
        }
        .cidade { font-weight: 500; color: #333; font-size: 20px; }
        .icone { font-size: 32px; }
        .temp { font-weight: 600; color: #2c3e50; font-size: 28px; }
        .desc { font-size: 16px; color: #7f8c8d; margin-left: 5px; }
        .bairro { font-size: 14px; color: #95a5a6; margin-left: 5px; }
        #imagem-final {
            display: none;
            padding: 0;
            box-shadow: none;
            border: none;
        }
    </style>
</head>
<body>
    <!-- Container HTML (invisível após primeira carga) -->
    <div id="widget-container">
        <span class="cidade" id="cidade">Barra Funda</span>
        <span class="bairro">SP</span>
        <span class="icone" id="icone">⏳</span>
        <span class="temp" id="temp">--°C</span>
        <span class="desc" id="desc"></span>
    </div>

    <!-- Imagem final (o que o usuário vê depois) -->
    <img id="imagem-final" alt="Previsão do tempo">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const LAT = "-23.5245";
        const LON = "-46.6658";
        const KEY = "04ebc24bf8afbd407fd0b32ed6f06d2a";
        
        // ⚡ Flag para controlar se já convertemos para imagem
        let imagemPronta = false;
        
        function capitalizar(str) {
            return str.replace(/(?:^|\s)\S/g, l => l.toUpperCase());
        }

        const emoticons = {
            "01d":"☀️","01n":"🌙","02d":"⛅","02n":"☁️",
            "03d":"☁️","03n":"☁️","04d":"☁️","04n":"☁️",
            "09d":"🌧️","09n":"🌧️","10d":"🌦️","10n":"🌧️",
            "11d":"⛈️","11n":"⛈️","13d":"❄️","13n":"❄️",
            "50d":"🌫️","50n":"🌫️"
        };

        const container = document.getElementById('widget-container');
        const imagemFinal = document.getElementById('imagem-final');

        async function buscarDados() {
            try {
                const url = `https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&units=metric&appid=${KEY}&lang=pt_br`;
                const r = await fetch(url);
                const d = await r.json();
                
                document.getElementById('icone').textContent = emoticons[d.weather[0].icon] || "🌡️";
                document.getElementById('temp').textContent = Math.round(d.main.temp) + '°C';
                document.getElementById('desc').textContent = capitalizar(d.weather[0].description);
            } catch {
                document.getElementById('icone').textContent = "☁️";
                document.getElementById('temp').textContent = "--°C";
                document.getElementById('desc').textContent = "Offline";
            }
            
            // Se ainda não temos a imagem pronta, converte agora
            if (!imagemPronta) {
                setTimeout(converterParaImagem, 200);
            }
        }
        
        function converterParaImagem() {
            html2canvas(container, {
                backgroundColor: 'white',
                scale: 2,
                logging: false,
                allowTaint: false,
                useCORS: true
            }).then((canvas) => {
                const dataURL = canvas.toDataURL('image/png');
                
                // Esconde o container HTML
                container.style.display = 'none';
                
                // Mostra a imagem final
                imagemFinal.src = dataURL;
                imagemFinal.style.display = 'inline-flex';
                
                // Marca que já temos a imagem
                imagemPronta = true;
            });
        }
        
        // ⚡ Atualização silenciosa (sem piscar)
        async function atualizarSilencioso() {
            if (!imagemPronta) return;
            
            try {
                const url = `https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&units=metric&appid=${KEY}&lang=pt_br`;
                const r = await fetch(url);
                const d = await r.json();
                
                // Atualiza os dados no container (que está oculto)
                document.getElementById('icone').textContent = emoticons[d.weather[0].icon] || "🌡️";
                document.getElementById('temp').textContent = Math.round(d.main.temp) + '°C';
                document.getElementById('desc').textContent = capitalizar(d.weather[0].description);
                
                // Regenera a imagem sem mostrar o container
                html2canvas(container, {
                    backgroundColor: 'white',
                    scale: 2,
                    logging: false
                }).then((canvas) => {
                    const dataURL = canvas.toDataURL('image/png');
                    imagemFinal.src = dataURL; // troca a imagem sem piscar
                });
            } catch (e) {
                // ignora erro silenciosamente
            }
        }
        
        // Inicia o processo
        buscarDados();
        
        // Atualiza a cada 30 minutos (sem piscar)
        setInterval(atualizarSilencioso, 30 * 60 * 1000);
    </script>
</body>
</html>
