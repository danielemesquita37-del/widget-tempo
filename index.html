<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Clima Barra Funda</title>
</head>
<body>
    <!-- Imagem que será atualizada -->
    <img id="clima" style="max-width:100%; height:auto; border-radius:30px; box-shadow:0 4px 15px rgba(0,0,0,0.1);">
    
    <script>
        const LAT = "-23.5245";
        const LON = "-46.6658";
        const KEY = "04ebc24bf8afbd407fd0b32ed6f06d2a";
        
        const icones = {
            "01d": "☀️", "01n": "🌙",
            "02d": "⛅", "02n": "☁️",
            "03d": "☁️", "03n": "☁️",
            "04d": "☁️", "04n": "☁️",
            "09d": "🌧️", "09n": "🌧️",
            "10d": "🌦️", "10n": "🌧️",
            "11d": "⛈️", "11n": "⛈️",
            "13d": "❄️", "13n": "❄️",
            "50d": "🌫️", "50n": "🌫️"
        };
        
        function atualizarImagem() {
            const apiUrl = `https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&units=metric&appid=${KEY}`;
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`;
            
            fetch(proxyUrl)
                .then(r => r.json())
                .then(d => {
                    const temp = Math.round(d.main.temp);
                    const icone = icones[d.weather[0].icon] || "🌡️";
                    
                    // Monta a URL da imagem diretamente
                    const imagemUrl = `https://img.shields.io/badge/Barra%20Funda-${icone}%20${temp}°C-4682B4?style=for-the-badge`;
                    
                    // Atualiza o src da imagem
                    document.getElementById('clima').src = imagemUrl;
                })
                .catch(() => {
                    document.getElementById('clima').src = "https://img.shields.io/badge/Barra%20Funda-Erro-red?style=for-the-badge";
                });
        }
        
        // Atualiza agora e a cada 30 minutos
        atualizarImagem();
        setInterval(atualizarImagem, 30 * 60 * 1000);
    </script>
</body>
</html>
