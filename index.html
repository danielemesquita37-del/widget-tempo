<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Clima Barra Funda</title>
</head>
<body>
    <script>
        // Coordenadas de Barra Funda
        const lat = -23.5245;
        const lon = -46.6658;
        
        // Mapa de códigos do CPTEC para emoticons
        const icones = {
            "1": "☀️", // céu claro
            "2": "☀️", // sol com algumas nuvens
            "3": "⛅",  // parcialmente nublado
            "4": "☁️", // nublado
            "5": "🌧️", // chuva
            "6": "⛈️", // tempestade
            "7": "🌫️", // neblina
        };
        
        fetch(`https://apitempo.inmet.gov.br/estacao/proxima/${lat}/${lon}`)
            .then(r => r.json())
            .then(d => {
                const temp = Math.round(d.temp);
                const codigo = d.condicao;
                const icone = icones[codigo] || "🌡️";
                
                const link = `https://img.shields.io/badge/Barra%20Funda-${icone}%20${temp}°C-4682B4?style=for-the-badge`;
                window.location.href = link;
            })
            .catch(() => {
                window.location.href = "https://img.shields.io/badge/Barra%20Funda-Erro-red?style=for-the-badge";
            });
    </script>
</body>
</html>
